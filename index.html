<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Aegis - Keep Vault v1.6</title>
    <style>
        /* Modern Dark Theme - Google Keep Inspired */
        :root {
            --bg-color: #202124;
            --text-color: #e8eaed;
            --card-bg: #2d2e31;
            --border-color: #5f6368;
            --title-color: #f1f3f4;
            --input-bg: #202124;
            --btn-primary: #4285f4;
            --btn-primary-hover: #357ae8;
            --shadow: rgba(0,0,0,0.5);
            --header-color: #f1f3f4;
            --tag-bg: #3c4043;
            --tag-text: #bdc1c6;
            --admin-bg: #1a1b1c;
            --folder-hover: #41331c;
            --folder-active-text: #ffbb00;
        }

        [data-theme="light"] {
            --bg-color: #ffffff;
            --text-color: #202124;
            --card-bg: #f1f3f4;
            --border-color: #dadce0;
            --title-color: #202124;
            --input-bg: #ffffff;
            --btn-primary: #1a73e8;
            --btn-primary-hover: #1557b0;
            --shadow: rgba(0,0,0,0.1);
            --header-color: #202124;
            --tag-bg: #e8eaed;
            --tag-text: #3c4043;
            --admin-bg: #f8f9fa;
            --folder-hover: #fef7e0;
            --folder-active-text: #e37400;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-color); 
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background 0.3s, color 0.3s;
        }
        .container { width: 100%; max-width: 700px; }
        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px var(--shadow);
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            transition: background 0.3s, border 0.3s;
        }
        h1, h2, h3 { margin-top: 0; color: var(--header-color); }
        .center-text { text-align: center; }
        input, textarea, button, select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: var(--input-bg);
            color: var(--text-color);
            box-sizing: border-box;
            font-size: 14px;
        }
        textarea { resize: vertical; height: 80px; }
        button {
            background: var(--btn-primary);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover { background: var(--btn-primary-hover); }
        .hidden { display: none !important; }
        
        .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;}
        .crypto-bar { background: #e6c400; color: #000; font-weight: bold; padding: 10px; border-radius: 6px; margin-bottom: 15px; text-align: center; }
        
        .admin-panel {
            background: var(--admin-bg);
            border: 1px dashed var(--btn-primary);
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .toggle-container { display: flex; align-items: center; gap: 10px; }
        .toggle-switch { width: auto; margin: 0; cursor: pointer; }

        .workspace {
            display: grid;
            grid-template-columns: 220px 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .folder-desktop-container { display: block; }
        .folder-mobile-container { display: none; }

        @media (max-width: 680px) {
            .workspace { grid-template-columns: 1fr; }
            .folder-desktop-container { display: none; }
            .folder-mobile-container { display: block; }
        }

        .folder-list { display: flex; flex-direction: column; gap: 5px; }
        .folder-item {
            background: var(--bg-color);
            color: var(--text-color);
            text-align: left;
            padding: 10px;
            margin: 0;
            font-weight: normal;
            border: 1px solid transparent;
        }
        .folder-item.active {
            background: var(--folder-hover);
            border-color: var(--folder-active-text);
            color: var(--folder-active-text);
            font-weight: bold;
        }
        .inline-group { display: flex; gap: 10px; align-items: center; }
        .inline-group button { width: auto; white-space: nowrap; margin: 0; }
        
        .notes-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            width: 100%;
        }
        .note-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            position: relative;
            word-break: break-word;
        }
        .note-title { font-weight: bold; font-size: 16px; margin-bottom: 8px; color: var(--title-color); }
        .note-body { font-size: 14px; color: var(--text-color); white-space: pre-wrap; }
        .note-tag {
            display: inline-block;
            background: var(--tag-bg);
            color: var(--tag-text);
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 12px;
            margin-top: 10px;
        }
        .card-actions {
            margin-top: 15px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        .card-actions button {
            width: auto;
            margin: 0;
            padding: 6px 12px;
            font-size: 12px;
        }
        .action-edit-btn { background: #5f6368; }
        .action-edit-btn:hover { background: #70757a; }
        .action-delete-btn { background: #ea4335; }
        .action-delete-btn:hover { background: #c53727; }

        .danger-zone-btn {
            background: #ea4335;
            color: white;
            font-size: 12px;
            padding: 6px 12px;
            margin-top: 10px;
        }
        .danger-zone-btn:hover { background: #c53727; }
        
        .secondary-zone-btn {
            background: #ffbb00;
            color: black;
            font-size: 12px;
            padding: 6px 12px;
            margin-top: 15px;
        }
        .secondary-zone-btn:hover { background: #e0a400; }
        /* Custom Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-box {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 4px 15px var(--shadow);
        }
        .modal-message { margin-bottom: 15px; font-size: 14px; color: var(--text-color); white-space: pre-wrap; }
        .modal-input { margin-bottom: 15px; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; }
        .modal-actions button { width: auto; margin: 0; padding: 8px 16px; }
        .modal-btn-cancel { background: #5f6368; }
        .modal-btn-cancel:hover { background: #70757a; }
        .modal-btn-confirm { background: var(--btn-primary); }
    </style>
</head>
<body>

    <div class="container">
        <div id="auth-section" class="card">
            <h1 class="center-text">Aegis v1.6</h1>
            <h2 class="center-text">Login or Register</h2>
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="password" placeholder="Account Password">
            <button id="login-btn">Log In</button>
            <button id="signup-btn" style="background: #34a853;">Sign Up New Account</button>
            <p id="auth-error" style="color: #f28b82; font-size: 14px; text-align: center;"></p>
        </div>

        <div id="keep-notes-section" class="hidden" style="width: 100%;">
            <div class="nav-header">
                <h3>Aegis Vault: <span id="user-display" style="color:var(--btn-primary);"></span></h3>
                <div style="display: flex; gap: 10px;">
                    <button id="theme-toggle-btn" style="background: var(--border-color); width: auto; margin: 0; padding: 8px 15px; color: var(--text-color);">🌓 Theme</button>
                    <button id="logout-btn" style="background: #ea4335; width: auto; margin: 0; padding: 8px 15px; color: white;">Log Out</button>
                </div>
            </div>

            <div class="crypto-bar">
                🔒 Vault Protection Enabled. End-to-End Cryptography Active.
            </div>

            <div id="admin-panel" class="admin-panel hidden">
                <span style="font-size: 13px; font-weight: bold; color: #4285f4;">🛠️ Admin Settings:</span>
                <div class="toggle-container">
                    <label for="signup-toggle" style="font-size: 13px;">Allow Public Registration:</label>
                    <input type="checkbox" id="signup-toggle" class="toggle-switch">

            </div>

            <div class="card" style="padding: 10px; margin-bottom: 15px;">
                <input type="text" id="search-bar" placeholder="🔍 Search notes by title or content..." style="margin: 0;">

            <div class="folder-mobile-container card" style="padding: 15px; margin-bottom: 15px;">

                <div class="inline-group" style="margin-top: 10px;">

                </div>
            </div>

            <div class="workspace">
                <div class="folder-desktop-container">
                    <h3>Folders</h3>
                    <div id="folder-list" class="folder-list"></div>
                    <div class="inline-group" style="margin-top: 15px;">
                        <input type="text" id="new-folder-name" placeholder="New folder..." style="margin: 0; padding: 8px;">
                        <button id="add-folder-btn" style="background: #34a853; padding: 8px 12px;">➕</button>
                    </div>
                    
                    <button id="rename-folder-btn" class="secondary-zone-btn" style="width: 100%;">✏️ Rename Current Folder</button>
                    <button id="delete-folder-btn" class="danger-zone-btn" style="width: 100%;">🗑️ Delete Current Folder</button>
                </div>

                <div>
                    <div class="note-creator card">
                        <h3 id="creator-mode-title" style="font-size:14px; color:#ffbb00; margin-bottom:5px;" class="hidden">📝 Editing Saved Note</h3>
                        <input type="text" id="note-title" placeholder="Title (e.g. Github Account)">
                        <textarea id="note-body" placeholder="Secure Info (e.g. User: vibe_coder / Pass: 123456)"></textarea>
                        
                        <div class="inline-group">
                            <label for="note-folder-select" style="font-size: 13px; color: #9aa0a6;">Target Folder:</label>
                            <select id="note-folder-select" style="margin: 0; padding: 6px; width: auto; flex-grow: 1;">
                                <option value="General">General</option>
                            </select>
                        </div>
                        <button id="save-note-btn" style="background: #ffbb00; color: black; margin-top: 15px;">Save Secure Note</button>
                        <button id="cancel-edit-btn" style="background: #5f6368; color: white; margin-top: 5px;" class="hidden">Cancel Edit</button>
                    </div>

                    <div class="folder-mobile-container" style="margin-bottom: 15px; display: flex; flex-direction: column; gap: 5px;">
                        <button id="rename-folder-mobile-btn" class="secondary-zone-btn" style="margin: 0; width: 100%;">✏️ Rename Current Folder</button>
                        <button id="delete-folder-mobile-btn" class="danger-zone-btn" style="margin: 0; width: 100%;">🗑️ Delete Current Folder</button>
                    </div>

                    <h2 id="current-folder-view-title">Folder: General</h2>
                    <div id="notes-grid" class="notes-grid"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Custom Modal Overlay -->
    <div id="custom-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <div id="modal-message" class="modal-message"></div>
            <input type="text" id="modal-input" class="modal-input hidden">
            <div class="modal-actions">
                <button id="modal-btn-cancel" class="modal-btn-cancel hidden">Cancel</button>
                <button id="modal-btn-confirm" class="modal-btn-confirm">OK</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script>
        // --- PUT YOUR FIREBASE CONFIG HERE ---
        const firebaseConfig = {
  apiKey: "AIzaSyAqcMzNdz68xMkaULGPR1db11hpU5T6A_A",
  authDomain: "aegis-20c06.firebaseapp.com",
  databaseURL: "https://aegis-20c06-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "aegis-20c06",
  storageBucket: "aegis-20c06.firebasestorage.app",
  messagingSenderId: "485846929460",
  appId: "1:485846929460:web:51bc33ff08bc6173743a61",
  measurementId: "G-QKS4R3T6BX"
};

        // --- FEATURE #3: HARDCODE YOUR ADMIN ID HERE ---
        const SUPER_ADMIN_UID = "z8ENwkVdLXh7x8LDJ1bwKiDk3xy1";

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let encryptionKey = null; 
        let currentUserId = null;
        let unsubscribeNotes = null;
        let unsubscribeAdminConfig = null;
        
        let allDecryptedNotes = []; 
        let availableFolders = ["General"]; 
        let activeFolderFilter = "General"; 
        let searchQuery = "";
        
        // Feature #1: Track document reference context state
        let editingNoteId = null; 

        const authSection = document.getElementById('auth-section');
        const notesSection = document.getElementById('keep-notes-section');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('login-btn');
        const signupBtn = document.getElementById('signup-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const notesGrid = document.getElementById('notes-grid');
        const authError = document.getElementById('auth-error');
        const userDisplay = document.getElementById('user-display');
        
        const noteTitleInput = document.getElementById('note-title');
        const noteBodyInput = document.getElementById('note-body');
        const saveNoteBtn = document.getElementById('save-note-btn');
        const cancelEditBtn = document.getElementById('cancel-edit-btn');
        const creatorModeTitle = document.getElementById('creator-mode-title');
        const searchBar = document.getElementById('search-bar');
        
        const folderListContainer = document.getElementById('folder-list');
        const newFolderInput = document.getElementById('new-folder-name');
        const addFolderBtn = document.getElementById('add-folder-btn');
        const newFolderMobileInput = document.getElementById('new-folder-name-mobile');
        const addFolderMobileBtn = document.getElementById('add-folder-mobile-btn');
        
        const noteFolderSelect = document.getElementById('note-folder-select');
        const folderMobileSelect = document.getElementById('folder-mobile-select');
        const folderViewTitle = document.getElementById('current-folder-view-title');
        
        const deleteFolderBtn = document.getElementById('delete-folder-btn');
        const deleteFolderMobileBtn = document.getElementById('delete-folder-mobile-btn');
        const renameFolderBtn = document.getElementById('rename-folder-btn');
        const renameFolderMobileBtn = document.getElementById('rename-folder-mobile-btn');
        
        const adminPanel = document.getElementById('admin-panel');
        const signupToggle = document.getElementById('signup-toggle');

        async function deriveKeyFromPassword(password) {
            const encoder = new TextEncoder();
            const passwordBytes = encoder.encode(password);
            const salt = encoder.encode("AegisSalt2026Secure"); 
            const baseKey = await window.crypto.subtle.importKey("raw", passwordBytes, { name: "PBKDF2" }, false, ["deriveKey"]);
            return window.crypto.subtle.deriveKey(
                { name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" },
                baseKey, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]
            );
        }

        async function encryptText(plainText, key) {
            if(!plainText) return "";
            const encoder = new TextEncoder();
            const encodedText = encoder.encode(plainText);
            const iv = window.crypto.getRandomValues(new Uint8Array(12));
            const encryptedBytes = await window.crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, key, encodedText);
            return JSON.stringify({
                ciphertext: btoa(String.fromCharCode(...new Uint8Array(encryptedBytes))),
                iv: btoa(String.fromCharCode(...iv))
            });
        }

        async function decryptText(jsonString, key) {
            if(!jsonString) return "";
            try {
                const { ciphertext, iv } = JSON.parse(jsonString);
                const encryptedBytes = new Uint8Array(atob(ciphertext).split("").map(c => c.charCodeAt(0)));
                const ivBytes = new Uint8Array(atob(iv).split("").map(c => c.charCodeAt(0)));
                const decryptedBuffer = await window.crypto.subtle.decrypt({ name: "AES-GCM", iv: ivBytes }, key, encryptedBytes);
                return new TextDecoder().decode(decryptedBuffer);
            } catch (e) {
                return "[Decryption Error]";
            }
        }

        function handleAuthError(err) {
            switch (err.code) {
                case 'auth/wrong-password':
                case 'auth/user-not-found':
                case 'auth/invalid-email':
                    authError.textContent = "Invalid email address or password configuration.";
                    break;
                case 'auth/weak-password':
                    authError.textContent = "Security reject: Password must contain at least 6 characters.";
                    break;
                case 'auth/email-already-in-use':
                    authError.textContent = "This email is already registered to a security vault.";
                    break;
                default:
                    authError.textContent = "An error occurred during authentication. Please check inputs.";
            }
        }

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUserId = user.uid;
                userDisplay.textContent = user.email;
                if (passwordInput.value) { encryptionKey = await deriveKeyFromPassword(passwordInput.value); }
                authSection.classList.add('hidden');
                notesSection.classList.remove('hidden');
                emailInput.value = "";
                passwordInput.value = "";
                
                syncNotesFromFirestore();

                // FEATURE #3: Direct visual gating verification step inside front-end routines
                if (user.uid === SUPER_ADMIN_UID) {
                    listenToAdminConfig();
                } else {
                    adminPanel.classList.add('hidden');
                }
            } else {
                currentUserId = null;
                encryptionKey = null;
                if(unsubscribeNotes) unsubscribeNotes();
                if(unsubscribeAdminConfig) unsubscribeAdminConfig();
                authSection.classList.remove('hidden');
                notesSection.classList.add('hidden');
                adminPanel.classList.add('hidden');
                allDecryptedNotes = [];
                exitEditMode();
                renderInterface();
            }
        });

        function listenToAdminConfig() {
            unsubscribeAdminConfig = db.collection("system_config").doc("registration")
                .onSnapshot((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        signupToggle.checked = data.signupEnabled;
                        adminPanel.classList.remove('hidden');
                    }
                }, err => {
                    adminPanel.classList.add('hidden');
                });
        }

        signupToggle.addEventListener('change', (e) => {
            db.collection("system_config").doc("registration").update({
                signupEnabled: e.target.checked
            }).catch(async err => {
                await CustomModal.alert("Permission Denied.");
                signupToggle.checked = !e.target.checked;
            });
        });

        function handleFolderAddition(inputElement) {
            const folderName = inputElement.value.trim();
            if(!folderName) return;
            if(!availableFolders.includes(folderName)) {
                availableFolders.push(folderName);
                activeFolderFilter = folderName; 
                inputElement.value = "";
                renderInterface();
            }
        }

        addFolderBtn.addEventListener('click', () => handleFolderAddition(newFolderInput));
        addFolderMobileBtn.addEventListener('click', () => handleFolderAddition(newFolderMobileInput));

        folderMobileSelect.addEventListener('change', (e) => {
            activeFolderFilter = e.target.value;
            renderInterface();
        });

        searchBar.addEventListener('input', (e) => {
            searchQuery = e.target.value.toLowerCase();
            renderNotesGrid();
        });

        // FEATURE #1: Modified Save button worker to accommodate Updates
        saveNoteBtn.addEventListener('click', async () => {
            const title = noteTitleInput.value.trim();
            const body = noteBodyInput.value.trim();
            const chosenFolder = noteFolderSelect.value;
            
            if(!title && !body) return;
            if(!encryptionKey) { await CustomModal.alert("Session invalid."); return; }

            // Re-encrypt values before sending to the cloud
            const encryptedTitle = await encryptText(title, encryptionKey);
            const encryptedBody = await encryptText(body, encryptionKey);
            const encryptedFolder = await encryptText(chosenFolder, encryptionKey);

            const payload = {
                title: encryptedTitle,
                body: encryptedBody,
                folder: encryptedFolder,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            };

            if (editingNoteId) {
                // UPDATE MODE ACTIVE
                db.collection("users").doc(currentUserId).collection("notes").doc(editingNoteId).update(payload)
                    .then(() => {
                        exitEditMode();
                    })
                    .catch(async err => await CustomModal.alert("Update failed: " + err.message));
            } else {
                // STANDARD ADD MODE
                db.collection("users").doc(currentUserId).collection("notes").add(payload)
                    .then(() => {
                        noteTitleInput.value = "";
                        noteBodyInput.value = "";
                    })
                    .catch(async err => await CustomModal.alert("Firestore Error: " + err.message));
            }
        });

        // FEATURE #1: Helper methods for modifying note data flows
        function enterEditMode(note) {
            editingNoteId = note.id;
            noteTitleInput.value = note.title;
            noteBodyInput.value = note.body;
            noteFolderSelect.value = note.folder;
            
            saveNoteBtn.textContent = "Update Secure Note";
            saveNoteBtn.style.background = "#34a853"; // green
            saveNoteBtn.style.color = "white";
            cancelEditBtn.classList.remove('hidden');
            creatorModeTitle.classList.remove('hidden');
            
            // Scroll neatly back up to the form window
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function exitEditMode() {
            editingNoteId = null;
            noteTitleInput.value = "";
            noteBodyInput.value = "";
            noteFolderSelect.value = activeFolderFilter;
            
            saveNoteBtn.textContent = "Save Secure Note";
            saveNoteBtn.style.background = "#ffbb00"; // yellow
            saveNoteBtn.style.color = "black";
            cancelEditBtn.classList.add('hidden');
            creatorModeTitle.classList.add('hidden');
        }

        cancelEditBtn.addEventListener('click', exitEditMode);

        // FEATURE #2: Cascading Folder Renaming Engine Block
        async function executeFolderRenameRoutine() {
            if (activeFolderFilter === "General") {
                await CustomModal.alert("The system default 'General' root folder cannot be renamed.");
                return;
            }

            const newFolderName = await CustomModal.prompt(`Change folder name for "${activeFolderFilter}" to:`, activeFolderFilter);
            if (!newFolderName || newFolderName.trim() === activeFolderFilter) return;
            
            const standardizedNewName = newFolderName.trim();
            
            // Track files needing metadata patches
            const targetsToRename = allDecryptedNotes.filter(note => note.folder === activeFolderFilter);
            
            if (targetsToRename.length > 0) {
                // Encrypt the new target name locally
                const encryptedNewFolder = await encryptText(standardizedNewName, encryptionKey);
                
                const batchPromises = targetsToRename.map(note => {
                    return db.collection("users").doc(currentUserId).collection("notes").doc(note.id).update({
                        folder: encryptedNewFolder
                    });
                });
                
                await Promise.all(batchPromises);
            }
            
            await CustomModal.alert(`Folder successfully renamed to "${standardizedNewName}".`);
            activeFolderFilter = standardizedNewName;
            renderInterface();
        }

        renameFolderBtn.addEventListener('click', executeFolderRenameRoutine);
        renameFolderMobileBtn.addEventListener('click', executeFolderRenameRoutine);

        async function executeFolderDeletionRoutine() {
            if (activeFolderFilter === "General") {
                await CustomModal.alert("The 'General' folder is a system default root and cannot be removed.");
                return;
            }

            const userConfirmation = await CustomModal.prompt(`⚠️ WARNING: Deleting "${activeFolderFilter}" will permanently wipe out ALL password notes inside it.\n\nType the folder name precisely to confirm deletion:`);

            if (userConfirmation === activeFolderFilter) {
                const targetsToDelete = allDecryptedNotes.filter(note => note.folder === activeFolderFilter);
                
                if (targetsToDelete.length > 0) {
                    const batchPromises = targetsToDelete.map(note => {
                        return db.collection("users").doc(currentUserId).collection("notes").doc(note.id).delete();
                    });
                    await Promise.all(batchPromises);
                }
                
                await CustomModal.alert(`Folder "${activeFolderFilter}" has been successfully deleted.`);
                activeFolderFilter = "General";
                renderInterface();
            } else if (userConfirmation !== null) {
                await CustomModal.alert("Deletion canceled. Folder name typed incorrectly.");
            }
        }

        deleteFolderBtn.addEventListener('click', executeFolderDeletionRoutine);
        deleteFolderMobileBtn.addEventListener('click', executeFolderDeletionRoutine);

        function syncNotesFromFirestore() {
            unsubscribeNotes = db.collection("users").doc(currentUserId).collection("notes")
                .orderBy("timestamp", "desc")
                .onSnapshot(async (snapshot) => {
                    allDecryptedNotes = [];
                    const structuralFolders = new Set(["General"]); 
                    
                    for (let doc of snapshot.docs) {
                        const data = doc.data();
                        const decryptedTitle = await decryptText(data.title, encryptionKey);
                        const decryptedBody = await decryptText(data.body, encryptionKey);
                        let decryptedFolder = "General";
                        if(data.folder) { decryptedFolder = await decryptText(data.folder, encryptionKey); }
                        structuralFolders.add(decryptedFolder);

                        allDecryptedNotes.push({
                            id: doc.id,
                            title: decryptedTitle,
                            body: decryptedBody,
                            folder: decryptedFolder
                        });
                    }

                    availableFolders = Array.from(structuralFolders);
                    if (!availableFolders.includes(activeFolderFilter)) { activeFolderFilter = "General"; }
                    renderInterface();
                });
        }

        function renderInterface() {
            folderListContainer.innerHTML = "";
            noteFolderSelect.innerHTML = "";
            folderMobileSelect.innerHTML = "";

            availableFolders.forEach(folder => {
                const option = document.createElement('option');
                option.value = folder;
                option.textContent = folder;
                if(folder === activeFolderFilter) option.selected = true;
                noteFolderSelect.appendChild(option);

                const mobileOption = option.cloneNode(true);
                folderMobileSelect.appendChild(mobileOption);

                const button = document.createElement('button');
                button.className = `folder-item ${folder === activeFolderFilter ? 'active' : ''}`;
                button.textContent = `📁 ${folder}`;
                button.addEventListener('click', () => {
                    activeFolderFilter = folder;
                    if(editingNoteId) exitEditMode();
                    renderInterface();
                });
                folderListContainer.appendChild(button);
            });

            folderMobileSelect.value = activeFolderFilter;
            folderViewTitle.textContent = `Folder: ${activeFolderFilter}`;
            renderNotesGrid();
        }

        function renderNotesGrid() {
            notesGrid.innerHTML = "";
            const filtered = allDecryptedNotes.filter(note => {
                const matchesFolder = (note.folder === activeFolderFilter);
                const matchesSearch = note.title.toLowerCase().includes(searchQuery) || note.body.toLowerCase().includes(searchQuery);
                return matchesFolder && matchesSearch;
            });

            if(filtered.length === 0) {
                notesGrid.innerHTML = `<p style="color:#5f6368; text-align:center; font-style:italic; margin-top:20px;">No matching notes found here.</p>`;
                return;
            }

            filtered.forEach(note => {
                const noteCard = document.createElement('div');
                noteCard.className = 'note-card';
                noteCard.innerHTML = `
                    <div class="note-title">${note.title || '(No Title)'}</div>
                    <div class="note-body">${note.body || ''}</div>
                    <div class="note-tag">📍 ${note.folder}</div>
                    <div class="card-actions">
                        <button class="action-edit-btn" id="edit-${note.id}">Edit</button>
                        <button class="action-delete-btn" id="del-${note.id}">Delete</button>
                    </div>
                `;
                
                // Wire action workers individually 
                noteCard.querySelector(`#edit-${note.id}`).addEventListener('click', () => enterEditMode(note));
                noteCard.querySelector(`#del-${note.id}`).addEventListener('click', async () => {
                    const expectedTitle = note.title || "DELETE";
                    let promptMessage = `⚠️ WARNING: You are about to permanently delete this note.\n\nType the note title "${expectedTitle}" precisely to confirm deletion:`;
                    if (!note.title) {
                        promptMessage = `⚠️ WARNING: You are about to permanently delete this note (No Title).\n\nType "DELETE" precisely to confirm deletion:`;
                    }
                    const userConfirm = await CustomModal.prompt(promptMessage);
                    
                    if(userConfirm === expectedTitle) {
                        db.collection("users").doc(currentUserId).collection("notes").doc(note.id).delete();
                        if(editingNoteId === note.id) exitEditMode();
                    } else if (userConfirm !== null) {
                        await CustomModal.alert("Deletion canceled. Title typed incorrectly.");
                    }
                });
                
                notesGrid.appendChild(noteCard);
            });
        }

        loginBtn.addEventListener('click', () => {
            auth.signInWithEmailAndPassword(emailInput.value, passwordInput.value).catch(handleAuthError);
        });

        signupBtn.addEventListener('click', () => {
            db.collection("system_config").doc("registration").get().then((doc) => {
                if (doc.exists && doc.data().signupEnabled === true) {
                    auth.createUserWithEmailAndPassword(emailInput.value, passwordInput.value).catch(handleAuthError);
                } else {
                    authError.textContent = "Registration Closed: New account sign-ups are currently disabled by the administrator.";
                }
            }).catch(err => {
                authError.textContent = "System validation error. Account generation rejected.";
            });
        });

        logoutBtn.addEventListener('click', () => { auth.signOut(); });

        // Theme Logic
        const themeToggleBtn = document.getElementById('theme-toggle-btn');
        const currentTheme = localStorage.getItem('aegis-theme') || 'dark';
        if (currentTheme === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
        }

        themeToggleBtn.addEventListener('click', () => {
            const isLight = document.documentElement.getAttribute('data-theme') === 'light';
            if (isLight) {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('aegis-theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
                localStorage.setItem('aegis-theme', 'light');
            }
        });

        // Custom Modal Logic
        const CustomModal = {
            element: document.getElementById('custom-modal'),
            messageEl: document.getElementById('modal-message'),
            inputEl: document.getElementById('modal-input'),
            cancelBtn: document.getElementById('modal-btn-cancel'),
            confirmBtn: document.getElementById('modal-btn-confirm'),

            show(message, type = 'alert', defaultValue = '') {
                return new Promise((resolve) => {
                    this.messageEl.textContent = message;
                    this.inputEl.value = defaultValue;
                    this.element.classList.remove('hidden');
                    
                    if (type === 'prompt') {
                        this.inputEl.classList.remove('hidden');
                        this.inputEl.focus();
                    } else {
                        this.inputEl.classList.add('hidden');
                    }

                    if (type === 'alert') {
                        this.cancelBtn.classList.add('hidden');
                    } else {
                        this.cancelBtn.classList.remove('hidden');
                    }

                    const cleanup = () => {
                        this.confirmBtn.onclick = null;
                        this.cancelBtn.onclick = null;
                        this.inputEl.onkeydown = null;
                        this.element.classList.add('hidden');
                    };

                    this.confirmBtn.onclick = () => {
                        cleanup();
                        if (type === 'prompt') resolve(this.inputEl.value);
                        else if (type === 'confirm') resolve(true);
                        else resolve();
                    };

                    this.cancelBtn.onclick = () => {
                        cleanup();
                        if (type === 'prompt') resolve(null);
                        else if (type === 'confirm') resolve(false);
                    };
                    
                    if (type === 'prompt') {
                        this.inputEl.onkeydown = (e) => {
                            if (e.key === 'Enter') this.confirmBtn.onclick();
                            if (e.key === 'Escape') this.cancelBtn.onclick();
                        };
                    }
                });
            },
            alert(message) { return this.show(message, 'alert'); },
            confirm(message) { return this.show(message, 'confirm'); },
            prompt(message, defaultValue) { return this.show(message, 'prompt', defaultValue); }
        };
    </script>
</body>
</html>
